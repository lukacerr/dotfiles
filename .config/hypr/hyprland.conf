source = ~/.config/hypr/environment.conf
source = ~/.config/hypr/display.conf

source = ~/.config/hypr/rules.conf

source = ~/.config/hypr/input.conf
source = ~/.config/hypr/keybinds.conf

source = ~/.config/hypr/autostart.conf

general {
    gaps_in = $gapsIn
    gaps_out = $gapsOut
    border_size = $borderSize
    col.active_border = $primaryColor1
    col.inactive_border = $secondaryColor2
	allow_tearing = $allowTearing
	resize_on_border = true
}

decoration {
	rounding = $rounding

	blur {
        size = $blurSize
		xray = true
	}

	shadow {
		color = $neutralColor3
		render_power = 2
	}
}

animations {
	bezier = easeIn, $easeInBezier
    bezier = easeOut, $easeOutBezier

    animation = windows, 1, $animationSpeed, default, popin
    animation = windowsMove, 1, $animationSpeed, easeOut

    animation = windowsIn, 0
    animation = windowsOut, 0

    animation = fadeSwitch, 0

    animation = layersIn, 1, $animationSpeed, default
    animation = layersOut, 1, $animationSpeed, default

    animation = fadeIn, 1, $animationSpeed, easeIn
    animation = fadeOut, 1, $animationSpeed, easeOut

    animation = border, 0

    animation = workspaces, 1, $animationSpeed, default, slidefade
}

group {
	auto_group = false
	merge_floated_into_tiled_on_groupbar = true
	col.border_active = $primaryColor1
	col.border_inactive = $secondaryColor2
	col.border_locked_active = $primaryColor2
	col.border_locked_inactive = $secondaryColor3

	groupbar {
		font_size = 12
		height = 24

		text_color = $neutralColor2
		col.active = $primaryColor2
		col.inactive = $secondaryColor3
	}
}

misc {
    disable_hyprland_logo = true
	disable_splash_rendering = true
	col.splash = $primaryColor1

	font_family = $fontFamily
    splash_font_family = $fontFamily
   	background_color = $secondaryColor3

    animate_manual_resizes = true
    focus_on_activate = true

	background_color = $neutralColor1
	new_window_takes_over_fullscreen = 1
}

binds {
    allow_workspace_cycles = true
    workspace_center_on = 1
	allow_pin_fullscreen = true
}

xwayland {
	force_zero_scaling = true
}

cursor {
	persistent_warps = true
	warp_on_change_workspace = 1
	hide_on_touch = true
}

dwindle {
    force_split = 2
    preserve_split = true
}

workspace = 1, default:true, monitor:DP-1
workspace = 6, default:true, monitor:DP-3
workspace = r[1-5], monitor:DP-1
workspace = r[6-9], monitor:DP-3
# workspace = , on-created-empty:$applauncher

